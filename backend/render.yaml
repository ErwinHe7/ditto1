services:
  - type: web
    name: ditto-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: N_SIMULATIONS_PER_SCENARIO
        value: "10"
      - key: LLM_CONCURRENCY
        value: "15"
      - key: DATABASE_URL
        fromDatabase:
          name: ditto-db
          property: connectionString

databases:
  - name: ditto-db
    databaseName: ditto
    plan: free
